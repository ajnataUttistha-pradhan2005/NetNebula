services:
  mongodb:
    image: mongo:latest
    container_name: netnebula-mongodb
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netnebula-network

  ollama:
    image: ollama/ollama:latest
    container_name: netnebula-ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - netnebula-network

  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: netnebula-ollama-setup
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "sleep 5; ollama pull llama3.2:1b"
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - netnebula-network

  backend:
    build: ./backend
    container_name: netnebula-backend
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/netnebula
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull-model:
        condition: service_completed_successfully
    networks:
      - netnebula-network

  frontend:
    build: ./frontend
    container_name: netnebula-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - netnebula-network

networks:
  netnebula-network:
    driver: bridge

volumes:
  mongodb_data:
  ollama_data:
