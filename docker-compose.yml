services:
  mongodb:
    image: mongo:latest
    container_name: netnebula-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - netnebula-network

  ollama:
    image: ollama/ollama:latest
    container_name: netnebula-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - netnebula-network

  backend:
    build: ./backend
    container_name: netnebula-backend
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/netnebula
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - mongodb
      - ollama
    networks:
      - netnebula-network

  frontend:
    build: ./frontend
    container_name: netnebula-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - netnebula-network

networks:
  netnebula-network:
    driver: bridge

volumes:
  mongodb_data:
  ollama_data:
